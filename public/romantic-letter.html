<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinematic Romantic Letter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/romantic-letter.css" />
  </head>
  <body>
    <div class="sky-gradient" aria-hidden="true"></div>
    <canvas id="starsCanvas" class="layer stars" aria-hidden="true"></canvas>
    <canvas id="heartsCanvas" class="layer hearts" aria-hidden="true"></canvas>
    <div class="mist mist-a" aria-hidden="true"></div>
    <div class="mist mist-b" aria-hidden="true"></div>
    <div class="atmosphere" aria-hidden="true"></div>

    <main id="scene" class="scene">
      <button id="audioToggle" class="audio-toggle" type="button" aria-label="Toggle sound" title="Toggle sound">
        ♫
      </button>

      <button id="envelopeTrigger" class="envelope-trigger" type="button" aria-label="Open letter">
        <div id="sparkBurst" class="spark-burst" aria-hidden="true"></div>

        <div id="envelopeWrap" class="envelope-wrap">
          <div class="envelope-glow"></div>
          <div class="rim-light"></div>
          <div class="envelope-reflect"></div>

          <div class="envelope-body">
            <div class="env-back"></div>
            <div class="env-front"></div>
            <div class="env-flap"></div>

            <article id="letter" class="letter" aria-live="polite">
              <div class="paper-shadow" aria-hidden="true"></div>
              <div class="letter-inner" id="letterInner">
                <h1 class="line">My love,</h1>
                <p class="line">If you are reading this, it means you chose to open something that carries my heart inside.</p>
                <p class="line">In a world full of noise, you are my quiet place.</p>
                <p class="line">In days that feel heavy, you are my light.</p>
                <p class="line">Every smile of yours feels like a sunrise I never want to miss.</p>
                <p class="line">I don't know what the future holds,</p>
                <p class="line">but if it has you in it,</p>
                <p class="line">then I am no longer afraid of anything.</p>
                <p class="line">Thank you for existing.</p>
                <p class="line">Thank you for being you.</p>
                <p class="line signature">Forever yours.</p>
              </div>
            </article>
          </div>
        </div>
      </button>

      <p class="hint">Click the envelope</p>
    </main>

    <audio id="bgAmbient" preload="none" loop></audio>
    <audio id="loveSong" preload="none"></audio>

    <script src="/romantic-letter.js"></script>
  </body>
</html>
