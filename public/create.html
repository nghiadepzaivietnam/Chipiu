<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tạo khoảnh khắc</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/ai-widget.css" />
  </head>
  <body class="create-page">
    <div class="kitty-bg-shape kitty-shape-1"></div>
    <div class="kitty-bg-shape kitty-shape-2"></div>
    <div class="kitty-bg-shape kitty-shape-3"></div>

    <header class="top-nav-wrap create-nav-wrap" id="createNavWrap">
      <button
        class="nav-toggle create-nav-toggle"
        id="createNavToggle"
        type="button"
        aria-expanded="false"
        aria-controls="createNavMenu"
      >
        ☰ Menu
      </button>
      <nav class="top-nav create-top-nav" id="createNavMenu">
        <a class="nav-link" href="/">Trang chủ</a>
        <a class="nav-link" href="/journal.html">Nhật ký</a>
        <a class="nav-link primary" href="/create.html">Tạo khoảnh khắc</a>
        <a class="nav-link" href="/counter.html">Đếm ngày yêu</a>
        <a class="nav-link" href="/period.html">Dự đoán kỳ kinh</a>
        <a class="nav-link" href="/hanh-trinh-toi-2-dua.html">Hành trình</a>
      </nav>
    </header>

    <main class="kitty-main">
      <header class="kitty-hero card">
        <p class="kitty-kicker">Sweet Memory</p>
        <h1><span class="kitty-face-icon hk-1" aria-hidden="true"></span> Hộp thư khoảnh khắc</h1>
        <p class="kitty-sub">Đăng ảnh, video và caption theo tone hồng Hello Kitty để lưu ký niêm của hai đứa.</p>
        <div class="kitty-links">
          <a class="kitty-link" href="/"><span class="kitty-face-icon kitty-tiny-icon hk-2" aria-hidden="true"></span> Về trang chủ</a>
          <a class="kitty-link" href="/journal.html"><span class="kitty-face-icon kitty-tiny-icon hk-3" aria-hidden="true"></span> Xem nhật ký</a>
        </div>
      </header>

      <section class="kitty-form-wrap card">
        <div class="kitty-bow" aria-hidden="true"></div>
        <form id="moment-form" class="kitty-form">
          <label class="field">
            <span class="kitty-label"><span class="kitty-mini-icon kitty-face-icon hk-4" aria-hidden="true"></span>Người đăng</span>
            <div class="kitty-owner-row">
              <label class="kitty-owner-chip"><input type="radio" name="owner" value="Hải Anh" required /> Chíp iu</label>
              <label class="kitty-owner-chip"><input type="radio" name="owner" value="Trọng Nghĩa" required /> Trọng Nghĩa</label>
            </div>
          </label>

          <label class="field">
            <span class="kitty-label"><span class="kitty-mini-icon kitty-face-icon hk-5" aria-hidden="true"></span> Caption</span>
            <textarea name="caption" rows="4" placeholder="Caption..."></textarea>
          </label>

          <label class="field">
            <span class="kitty-label"><span class="kitty-mini-icon kitty-face-icon hk-6" aria-hidden="true"></span>Ảnh hoặc Video</span>
            <input type="file" name="media" accept="image/*,video/*" />
          </label>

          <label class="field checkbox kitty-checkbox">
            <input type="checkbox" name="allowCombined" checked />
          </label>

          <button type="submit" class="kitty-submit"><span class="kitty-face-icon kitty-tiny-icon hk-7" aria-hidden="true"></span> Lưu khoảnh khắc</button>
          <p id="form-status" class="status kitty-status"></p>
        </form>
      </section>
    </main>

    <script src="/user-context.js"></script>
    <script src="/main.js"></script>
    <script src="/ai-widget.js"></script>
    <script>
      (() => {
        const navWrap = document.getElementById("createNavWrap");
        const navToggle = document.getElementById("createNavToggle");
        const isMobileNav = () => window.matchMedia("(max-width: 720px)").matches;
        const setNavOpen = (open) => {
          if (!navWrap || !navToggle) return;
          navWrap.classList.toggle("open", open);
          navToggle.setAttribute("aria-expanded", open ? "true" : "false");
        };

        navToggle?.addEventListener("click", () => {
          setNavOpen(!navWrap?.classList.contains("open"));
        });

        document.addEventListener("click", (event) => {
          if (!isMobileNav() || !navWrap?.classList.contains("open")) return;
          if (navWrap.contains(event.target)) return;
          setNavOpen(false);
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") setNavOpen(false);
        });

        window.addEventListener("resize", () => {
          if (!isMobileNav()) setNavOpen(false);
        });

        document.querySelectorAll("#createNavMenu .nav-link").forEach((link) => {
          link.addEventListener("click", () => {
            if (isMobileNav()) setNavOpen(false);
          });
        });
      })();
    </script>
  </body>
</html>
