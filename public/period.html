<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dự đoán kỳ kinh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/ai-widget.css" />
    <style>
      :root {
        --pink-1: #ff76b6;
        --pink-2: #ff9fcb;
        --rose: #8a3b64;
        --soft: rgba(255, 255, 255, 0.86);
        --line: rgba(236, 127, 181, 0.34);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Quicksand", sans-serif;
        color: #5b3150;
        background: #fff2f8;
        padding: calc(82px + env(safe-area-inset-top, 0px)) 12px 24px;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(255, 240, 248, 0.2), rgba(255, 219, 239, 0.46)),
          url('/hello-kitty-wallpaper.jpg') center / cover no-repeat;
        filter: saturate(1.04);
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background: radial-gradient(circle at 10% 12%, rgba(255, 126, 188, 0.24), transparent 32%),
          radial-gradient(circle at 90% 4%, rgba(255, 189, 218, 0.3), transparent 34%);
      }

      .top-nav {
        position: fixed;
        top: calc(10px + env(safe-area-inset-top, 0px));
        left: 12px;
        right: 12px;
        z-index: 30;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding: 8px;
        border-radius: 18px;
        background: rgba(255, 247, 252, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.68);
        backdrop-filter: blur(12px);
        box-shadow: 0 12px 24px rgba(219, 94, 152, 0.2);
      }
      .top-nav::-webkit-scrollbar { display: none; }
      .nav-link {
        flex: 0 0 auto;
        white-space: nowrap;
        text-decoration: none;
        padding: 9px 12px;
        border-radius: 12px;
        font-weight: 700;
        color: var(--pink-1);
        background: #fff;
        border: 1px solid rgba(255, 130, 191, 0.25);
      }
      .nav-link.primary {
        color: #fff;
        border: none;
        background: linear-gradient(135deg, var(--pink-1), var(--pink-2));
      }

      .period-main {
        width: min(980px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 12px;
      }
      .card {
        border-radius: 20px;
        background: var(--soft);
        border: 1px solid rgba(255, 255, 255, 0.76);
        box-shadow: 0 10px 24px rgba(222, 91, 154, 0.16);
        padding: 14px;
      }
      .hero {
        background: linear-gradient(155deg, rgba(255, 173, 221, 0.38), rgba(255, 236, 248, 0.94));
      }
      .hero h1 {
        margin: 6px 0 4px;
        font-family: "Baloo 2", sans-serif;
        font-size: clamp(28px, 7vw, 40px);
        line-height: 1.04;
        color: var(--rose);
      }
      .hero p { margin: 0; font-weight: 700; color: #8f4b70; }

      .grid {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        gap: 12px;
      }
      .section-title {
        margin: 0 0 10px;
        font-family: "Baloo 2", sans-serif;
        font-size: 24px;
        color: #75345a;
      }
      .field { margin-bottom: 10px; }
      .label {
        display: block;
        margin-bottom: 6px;
        font-weight: 700;
        color: #8b4a6f;
      }
      .input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        min-height: 42px;
        padding: 8px 10px;
        font: inherit;
        color: #5d3551;
        background: #fff;
      }
      .row { display: flex; gap: 8px; flex-wrap: wrap; }
      .btn {
        border: none;
        border-radius: 12px;
        min-height: 40px;
        padding: 8px 12px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      .btn.primary {
        color: #fff;
        background: linear-gradient(135deg, var(--pink-1), var(--pink-2));
      }
      .btn.soft {
        color: var(--pink-1);
        background: #fff;
        border: 1px solid var(--line);
      }

      .calendar-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
        padding: 0 max(16px, env(safe-area-inset-left, 0px));
      }
      .month-title {
        margin: 0;
        font-family: "Baloo 2", sans-serif;
        font-size: clamp(22px, 5vw, 30px);
        color: #6f2f53;
      }
      .weekday,
      .days {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 6px;
        padding-left: max(16px, env(safe-area-inset-left, 0px));
        padding-right: max(16px, env(safe-area-inset-right, 0px));
      }
      .weekday span {
        text-align: center;
        font-size: 11px;
        font-weight: 700;
        color: #9c6782;
      }
      .day {
        border: 1px solid rgba(234, 136, 187, 0.26);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.86);
        min-height: 44px;
        font: inherit;
        font-weight: 700;
        color: #733558;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        position: relative;
        z-index: 2;
      }
      .day.outside { opacity: 0.42; }
      .day.today { box-shadow: inset 0 0 0 2px #f7bb6f; }
      .day.today::after {
        content: "";
        position: absolute;
        top: 5px;
        right: 5px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #f7bb6f;
      }
      .day.logged {
        color: #fff;
        border-color: rgba(215, 92, 153, 0.8);
        background: linear-gradient(135deg, #ff7bb8, #ff9aca);
      }
      .day.predicted:not(.logged) {
        background: rgba(255, 201, 228, 0.7);
        border-color: rgba(220, 116, 172, 0.66);
      }

      .legend {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        font-size: 12px;
        font-weight: 700;
        color: #844666;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
      }
      .dot.logged { background: #ff6cae; }
      .dot.predicted { background: #f4a3ca; }
      .dot.today { background: #f7bb6f; }

      .list {
        margin: 8px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 6px;
        max-height: 220px;
        overflow: auto;
      }
      .list li {
        border: 1px dashed var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.76);
        padding: 7px 9px;
        font-weight: 700;
        color: #7b415f;
      }
      .status {
        margin: 8px 0 0;
        font-size: 13px;
        font-weight: 700;
        color: #8e5a72;
        min-height: 18px;
      }

      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
      }
      @media (max-width: 520px) {
        .calendar-head {
          padding-left: max(20px, env(safe-area-inset-left, 0px));
          padding-right: max(20px, env(safe-area-inset-right, 0px));
        }
        .weekday,
        .days {
          padding-left: max(20px, env(safe-area-inset-left, 0px));
          padding-right: max(20px, env(safe-area-inset-right, 0px));
          gap: 5px;
        }
      }
    </style>
  </head>
  <body class="period-page">
    <nav class="top-nav" aria-label="Điều hướng">
      <a class="nav-link" href="/">Trang chủ</a>
      <a class="nav-link" href="/journal.html">Nhật ký</a>
      <a class="nav-link" href="/create.html">Tạo khoảnh khắc</a>
      <a class="nav-link" href="/counter.html">Đếm ngày yêu</a>
      <a class="nav-link primary" href="/period.html">Dự đoán kỳ kinh</a>
    </nav>

    <main class="period-main">
      <section class="card hero">
        <h1>Lịch kỳ kinh mới</h1>
        <p>Trang mới tối giản cho điện thoại, bấm vào ngày để đánh dấu nhanh, không lag.</p>
      </section>

      <div class="grid">
        <section class="card">
          <h2 class="section-title">Cài đặt</h2>
          <div class="field">
            <label class="label" for="anchorDate">Ngày bắt đầu kỳ gần nhất</label>
            <input class="input" id="anchorDate" type="date" />
          </div>
          <div class="field">
            <label class="label" for="cycleLength">Độ dài chu kỳ (ngày)</label>
            <input class="input" id="cycleLength" type="number" min="20" max="45" />
          </div>
          <div class="field">
            <label class="label" for="periodLength">Số ngày hành kinh</label>
            <input class="input" id="periodLength" type="number" min="2" max="10" />
          </div>
          <div class="row">
            <button class="btn primary" id="saveBtn" type="button">Lưu</button>
            <button class="btn soft" id="clearBtn" type="button">Xóa ngày đã chọn</button>
          </div>
          <p class="status" id="saveStatus"></p>

          <h3 class="section-title" style="font-size:22px;margin-top:12px;">Ngày đã chọn</h3>
          <ul class="list" id="loggedList"></ul>
        </section>

        <section class="card">
          <div class="calendar-head">
            <button class="btn soft" id="prevBtn" type="button" aria-label="Tháng trước">←</button>
            <h2 class="month-title" id="monthTitle"></h2>
            <button class="btn soft" id="nextBtn" type="button" aria-label="Tháng sau">→</button>
          </div>

          <div class="weekday">
            <span>T2</span><span>T3</span><span>T4</span><span>T5</span><span>T6</span><span>T7</span><span>CN</span>
          </div>
          <div class="days" id="calendarDays"></div>

          <div class="legend">
            <span><i class="dot logged"></i> Đã chọn</span>
            <span><i class="dot predicted"></i> Dự đoán</span>
            <span><i class="dot today"></i> Hôm nay</span>
          </div>
        </section>
      </div>
    </main>

    <script src="/period.js"></script>
    <script src="/ai-widget.js"></script>
  </body>
</html>
