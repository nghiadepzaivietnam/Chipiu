<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinematic Romantic Letter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/romantic-letter.css" />
  </head>
  <body>
    <div class="sky-gradient" aria-hidden="true"></div>
    <canvas id="starsCanvas" class="layer stars" aria-hidden="true"></canvas>
    <canvas id="heartsCanvas" class="layer hearts" aria-hidden="true"></canvas>
    <div class="mist mist-a" aria-hidden="true"></div>
    <div class="mist mist-b" aria-hidden="true"></div>
    <div class="atmosphere" aria-hidden="true"></div>

    <main id="scene" class="scene">
      <button id="audioToggle" class="audio-toggle" type="button" aria-label="Toggle sound" title="Toggle sound">
        ♫
      </button>

      <button id="envelopeTrigger" class="envelope-trigger" type="button" aria-label="Open letter">
        <div id="sparkBurst" class="spark-burst" aria-hidden="true"></div>

        <div id="envelopeWrap" class="envelope-wrap">
          <div class="envelope-glow"></div>
          <div class="rim-light"></div>
          <div class="envelope-reflect"></div>

          <div class="envelope-body">
            <div class="env-back"></div>
            <div class="env-front"></div>
            <div class="env-flap"></div>

            <article id="letter" class="letter" aria-live="polite">
              <div class="paper-shadow" aria-hidden="true"></div>
              <div class="letter-inner" id="letterInner">
                <h1 class="line">Gửi vợ,</h1>
                <p class="line">Ngay lúc này đây, anh đang rất xúc động khi viết bức thư này cho em. Tính đến nay, chúng mình đã đi cùng nhau được gần một năm rồi đấy yêu nhỉ? Mỗi ngày trôi qua, lại là một ngày đáng nhớ vì có em ở cạnh bên.</p>
                <p class="line">Hôm nay, 8/3 ngay lúc này đây, em đang mở bức thư này của anh thì cũng là lúc em biết rằng tình yêu của hai đứa mình lớn đến nhường nào.</p>
                <p class="line">Yêu xa!</p>
                <p class="line">Trên cuộc đời này có lẽ anh chưa từng nghĩ đến hai từ "YÊU XA". Trải lòng mà nói, với anh "yêu xa" TỪNG là một trải nghiệm khó khăn và không hề dễ chịu một chút nào. Nhưng từ khi gặp em, định nghĩa ấy dường như biến mất và dần dần nó trở thành "ngọn lửa thử vàng" để rèn lên một tình yêu bền đẹp giữa hai chúng ta. Hai người - hai trái tim ở hai nơi dù đã bốn mùa xuân, hạ, thu, đông, cùng nhau trải qua những thời khắc, những kỉ niệm thật đẹp.</p>
                <p class="line">Thật may mắn khi mỗi ngày anh thức dậy, anh mở mắt ra lại được thấy em ngủ say, dù có cách xa nhau cả ngàn cây số... Tuy xa mặt nhưng không hề cách lòng, anh cảm nhận được tình cảm của chúng mình đang lớn dần lên. Những tin nhắn yêu thương dần trở nên quen thuộc, những khoảng cách vô hình giữa hai chúng ta dần trở nên biến mất. Điều đó, làm anh nhớ đến câu nói của em: "Tình yêu của em lớn lên từng ngày, Nghĩa ạ!". Anh hiểu rằng, chẳng cần phải chứng minh, vì sự đồng hành của chúng ta là minh chứng rõ ràng nhất giữa tình yêu bền đẹp này.</p>
                <p class="line">Khi gặp em trong mắt anh, em là một cô bé mạnh mẽ. Mạnh mẽ đến khó tin, em rất giỏi, em giỏi toàn diện và tư duy của em là một "kì quan" vĩ đại. Vậy nên anh mong rằng, ở bên đấy, dù thiếu thốn tình yêu thương gia đình, bạn bè hay là tình yêu thương của anh, dù có gặp khó khăn thì em vẫn luôn vững lòng để bước tới phía trước. Cả một tương lai sáng đang chờ đón em và anh sẵn sàng đồng hành cùng mình trên suốt chặng đường ấy.</p>
                <p class="line">Anh vẫn luôn nói "Yêu em là điều anh không thể ngờ". Hai chúng ta tuy cả hai đều còn nhiều thiếu xót, có những lần chúng ta cãi vả, tưởng chừng như chẳng thể hiểu được nhau... nhưng thật may mắn, sau mỗi lần như vậy, chúng ta lại nhìn lại, lại yêu thương và hòa hợp với nhau. Anh mong rằng sau mỗi lần như vậy, chúng ta lại có thể ngồi lại, để hiểu nhau và viết tiếp lên câu chuyện của mình.</p>
                <p class="line">Đặc biệt rằng, khi cả hai có vấn đề, anh không muốn em IM LẶNG. Vì anh thà thấy em ngang ngược, em khó chịu và hung dữ với anh còn hơn là để em phải chịu bất cứ những uất ức nào một mình. Vậy nên bất cứ khi nào em khó chịu, mong em hiểu rằng dù em có mắng chửi anh thế nào, anh cũng sẽ không bao giờ hiểu lầm em.</p>
                <p class="line">...Cũng đã khá dài, vậy để anh nói tiếp khi chúng ta cùng nhau đọc bức thư này nhé.</p>
                <p class="line">Nhân dịp 8/3, anh chúc vợ yêu của anh ngày càng xinh đẹp, luôn luôn nở một nụ cười thật tươi mỗi khi chúng ta nhìn thấy nhau. Anh chúc cho sự nghiệp học hành và công việc của 2 đứa mình luôn phát triển, hanh thông và gặp nhiều điều may mắn!</p>
                <p class="line">Anh yêu của em,</p>
                <p class="line signature">Nguyễn Trọng Nghĩa</p>
              </div>
            </article>
          </div>
        </div>
      </button>

      <p class="hint">Click the envelope</p>
    </main>

    <audio id="bgAmbient" src="/audio/romantic-ambient.mp3" preload="none" loop></audio>
    <audio id="loveSong" src="/audio/noi-nay-co-anh.mp3" preload="none"></audio>

    <script src="/romantic-letter.js"></script>
  </body>
</html>
