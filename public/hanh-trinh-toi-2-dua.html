<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanh Trinh Toi 2 Dua</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #ff5f8d;
      --ink: #3c1f2b;
      --line-base: rgba(255, 135, 179, 0.45);
      --line-fill: linear-gradient(90deg, #ff4f87 0%, #ff77a5 42%, #ffc4dc 100%);
      --panel: rgba(255, 255, 255, 0.85);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      min-height: 100vh;
      font-family: "Space Grotesk", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(255, 185, 215, 0.5), transparent 35%),
        radial-gradient(circle at 88% 86%, rgba(255, 212, 232, 0.45), transparent 45%),
        linear-gradient(135deg, #fff3f8, #ffeaf3 45%, #fff8fb 100%);
      padding: 22px;
    }
    .journey-shell {
      width: min(1160px, 100%);
      margin: 0 auto;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.92);
      box-shadow: 0 24px 54px rgba(255, 108, 160, 0.18);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }
    .journey-head { padding: 24px 24px 8px; }
    .journey-title {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: clamp(28px, 4vw, 44px);
      color: #9e2f59;
      letter-spacing: 0.01em;
    }
    .journey-sub {
      margin: 10px 0 0;
      max-width: 880px;
      line-height: 1.6;
      opacity: 0.82;
    }
    .timeline-wrap { position: relative; padding: 20px 54px 22px; }
    .timeline-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.95);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 10px 24px rgba(255, 102, 154, 0.24);
      color: #b83568;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
    }
    .timeline-btn.prev { left: 8px; }
    .timeline-btn.next { right: 8px; }
    .timeline-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 95, 141, 0.55) transparent;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    .timeline-scroll::-webkit-scrollbar { height: 10px; }
    .timeline-scroll::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,95,141,0.75), rgba(244,124,60,0.65));
    }
    .timeline-track {
      position: relative;
      display: flex;
      gap: 58px;
      width: max-content;
      min-height: 460px;
      padding: 18px 20px;
    }
    .timeline-line {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      height: 4px;
      border-radius: 999px;
      background: var(--line-base);
      overflow: hidden;
      z-index: 0;
    }
    .timeline-line-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0%;
      background: var(--line-fill);
      box-shadow: 0 0 20px rgba(255, 79, 135, 0.52);
      transition: width 120ms ease-out;
    }
    .step {
      position: relative;
      width: 270px;
      min-width: 270px;
      min-height: 410px;
      scroll-snap-align: start;
      z-index: 1;
    }
    .step-node {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 4px solid #ff5f8d;
      background: #fff;
      box-shadow: 0 0 0 7px rgba(255, 122, 170, 0.2);
    }
    .step-card {
      position: absolute;
      width: 100%;
      border-radius: 18px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.92);
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 16px 34px rgba(255, 112, 165, 0.18);
      backdrop-filter: blur(7px);
      opacity: 0;
      transition: opacity 430ms ease, transform 430ms ease;
    }
    .step.top .step-card { bottom: calc(50% + 34px); transform: translateY(22px); }
    .step.bottom .step-card { top: calc(50% + 34px); transform: translateY(-22px); }
    .step.visible .step-card { opacity: 1; transform: translateY(0); }
    .year-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 6px 7px 6px 12px;
      background: linear-gradient(135deg, #ff5f8d, #ff85ae);
      color: #fff;
      font-weight: 800;
      font-size: 24px;
      line-height: 1;
      box-shadow: 0 10px 22px rgba(255, 92, 146, 0.36);
    }
    .role-tag {
      margin-top: 7px;
      display: inline-block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      color: #b33f6e;
      background: rgba(255, 180, 212, 0.24);
      border-radius: 999px;
      padding: 3px 9px;
    }
    .step-title { margin: 10px 0 6px; font-size: 18px; color: #5b1f36; }
    .step-desc { margin: 0; color: rgba(60, 31, 43, 0.82); line-height: 1.55; }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.95);
      object-fit: cover;
      background: #fff;
      display: block;
      flex: 0 0 auto;
    }
    .avatar.pair {
      width: 44px;
      height: 44px;
      border-width: 2px;
      margin-left: -12px;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.95);
    }
    .avatar-stack { display: inline-flex; align-items: center; margin-left: 2px; }
    .step.future .step-card {
      border-color: rgba(255, 174, 210, 0.95);
      background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,234,245,0.95));
      box-shadow: 0 0 0 1px rgba(255, 150, 196, 0.65), 0 0 28px rgba(255, 85, 145, 0.48);
      animation: futureGlow 2.4s ease-in-out infinite;
    }
    .step.future .step-node {
      border-color: #ff4a85;
      box-shadow: 0 0 0 8px rgba(255, 105, 160, 0.3), 0 0 20px rgba(255, 84, 142, 0.62);
    }
    .empty { margin: 18px 24px 28px; opacity: 0.75; }
    @keyframes futureGlow {
      0%,100% { box-shadow: 0 0 0 1px rgba(255, 150, 196, 0.65), 0 0 24px rgba(255, 85, 145, 0.42); }
      50% { box-shadow: 0 0 0 1px rgba(255, 150, 196, 0.85), 0 0 32px rgba(255, 85, 145, 0.56); }
    }
    @media (max-width: 900px) {
      .timeline-wrap { padding: 14px 14px 20px; }
      .timeline-btn { display: none; }
      .timeline-track { gap: 36px; min-height: 430px; padding: 14px 14px; }
      .timeline-line { left: 14px; right: 14px; }
      .step { width: min(78vw, 270px); min-width: min(78vw, 270px); }
      .year-pill { font-size: 22px; }
    }
  </style>
</head>
<body>
  <main class="journey-shell">
    <header class="journey-head">
      <h1 class="journey-title">Hanh Trinh Toi 2 Dua</h1>
      <p class="journey-sub">Noi nay hien thi timeline lay du lieu tu MongoDB. Ban cap nhat o trang journey-builder.</p>
    </header>

    <section class="timeline-wrap" aria-label="Timeline cuon ngang">
      <button class="timeline-btn prev" id="prevBtn" type="button" aria-label="Cuon trai">‹</button>
      <div class="timeline-scroll" id="timelineScroll">
        <div class="timeline-track" id="timelineTrack">
          <div class="timeline-line" aria-hidden="true">
            <div class="timeline-line-fill" id="timelineFill"></div>
          </div>
        </div>
      </div>
      <button class="timeline-btn next" id="nextBtn" type="button" aria-label="Cuon phai">›</button>
    </section>
    <p class="empty" id="emptyState" hidden>Chua co moc hanh trinh. Vao /journey-builder.html de them.</p>
  </main>

  <script>
    const DEFAULT_HAIANH = "/hai-anh.jpg";
    const DEFAULT_TOI = "/uploads/1772244572266-5389.jpg";
    const scrollEl = document.getElementById("timelineScroll");
    const fillEl = document.getElementById("timelineFill");
    const trackEl = document.getElementById("timelineTrack");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const emptyState = document.getElementById("emptyState");

    function roleLabel(role) {
      if (role === "haianh") return "Hai Anh";
      if (role === "toi") return "Trọng Nghĩa";
      return "Ca hai";
    }

    function topByRole(role, index) {
      if (role === "haianh") return true;
      if (role === "toi") return false;
      return index % 2 === 0;
    }

    function avatarHtml(role, avatars) {
      const a1 = `<img class="avatar" src="${avatars.haianh || DEFAULT_HAIANH}" alt="Hai Anh" onerror="this.src='${DEFAULT_HAIANH}'">`;
      const a2 = `<img class="avatar" src="${avatars.toi || DEFAULT_TOI}" alt="Trọng Nghĩa" onerror="this.src='${DEFAULT_HAIANH}'">`;
      if (role === "haianh") return a1;
      if (role === "toi") return a2;
      return `<span class="avatar-stack">${a1}<img class="avatar pair" src="${avatars.toi || DEFAULT_TOI}" alt="Trọng Nghĩa" onerror="this.src='${DEFAULT_HAIANH}'"></span>`;
    }

    function updateFill() {
      const maxScroll = Math.max(1, scrollEl.scrollWidth - scrollEl.clientWidth);
      const progress = Math.min(1, Math.max(0, scrollEl.scrollLeft / maxScroll));
      fillEl.style.width = `${(progress * 100).toFixed(2)}%`;
    }

    function bindReveal() {
      const steps = Array.from(trackEl.querySelectorAll("[data-step]"));
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) entry.target.classList.add("visible");
          });
        },
        { root: scrollEl, threshold: 0.42 }
      );
      steps.forEach((el) => observer.observe(el));
    }

    function renderJourney(data) {
      trackEl.querySelectorAll(".step").forEach((n) => n.remove());
      const avatars = data?.avatars || { haianh: DEFAULT_HAIANH, toi: DEFAULT_TOI };
      const items = Array.isArray(data?.items) ? data.items : [];
      emptyState.hidden = items.length > 0;

      items.forEach((item, idx) => {
        const top = topByRole(item.role, idx);
        const step = document.createElement("article");
        step.className = `step ${top ? "top" : "bottom"} ${item.future ? "future" : ""}`;
        step.setAttribute("data-step", "");
        step.innerHTML = `
          <div class="step-card">
            <div class="year-pill">
              ${item.date || "?"}
              ${avatarHtml(item.role, avatars)}
            </div>
            <span class="role-tag">${roleLabel(item.role)}</span>
            <h3 class="step-title">${item.title || "(Chua co tieu de)"}</h3>
            <p class="step-desc">${item.desc || ""}</p>
          </div>
          <div class="step-node" aria-hidden="true"></div>
        `;
        trackEl.appendChild(step);
      });

      bindReveal();
      updateFill();
    }

    async function init() {
      try {
        const res = await fetch("/api/journey");
        if (!res.ok) throw new Error("load fail");
        const data = await res.json();
        renderJourney(data);
      } catch (_e) {
        renderJourney({
          avatars: { haianh: DEFAULT_HAIANH, toi: DEFAULT_TOI },
          items: [],
        });
      }
    }

    prevBtn.addEventListener("click", () => {
      scrollEl.scrollBy({ left: -320, behavior: "smooth" });
    });
    nextBtn.addEventListener("click", () => {
      scrollEl.scrollBy({ left: 320, behavior: "smooth" });
    });
    scrollEl.addEventListener("scroll", updateFill, { passive: true });
    window.addEventListener("resize", updateFill, { passive: true });
    init();
  </script>
</body>
</html>
